services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-pharmacy_backend:latest}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_HOST_PORT:-8088}:8088"
    environment:
      DATABASE_URL: "postgres://postgres:admin@host.docker.internal:5432/postgres?options=--search_path=pharmacy"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      PORT: "8088"
      SERVER_ADDR: "0.0.0.0"
      JWT_EXPIRATION: "3600"
      LOG_LEVEL: "off"
      RUST_LOG: "off"
      PASSWORD_SALT: "${PASSWORD_SALT}"
      API_JWT_PRIVATE_PEM_PATH: "./pem/jwt_private.pem"
      API_JWT_PUBLIC_PEM_PATH: "./pem/jwt_public.pem"
      API_JWT_SECRET: "${API_JWT_SECRET}"
      API_JWT_SECRET_REFRESH: "${API_JWT_SECRET_REFRESH}"
      APP_TIMEZONE: "America/Mexico_City"
    volumes:
      - ./pem:/app/pem:ro
